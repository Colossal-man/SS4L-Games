<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$$4L GAMES</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050508;
            color: #f4f4f5;
            margin: 0;
            overflow-x: hidden;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Simple animations */
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .scale-in { animation: scaleIn 0.3s ease-out forwards; }
        @keyframes scaleIn {
            from { opacity: 0; scale: 0.9; }
            to { opacity: 1; scale: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Games Data
        const gamesData = [
            { id: "2048", title: "2048", thumbnail: "https://picsum.photos/seed/2048/400/300", iframeUrl: "https://play2048.co/", category: "Puzzle" },
            { id: "tetris", title: "Tetris", thumbnail: "https://picsum.photos/seed/tetris/400/300", iframeUrl: "https://tetris.com/play-tetris", category: "Classic" },
            { id: "snake", title: "Snake", thumbnail: "https://picsum.photos/seed/snake/400/300", iframeUrl: "https://www.google.com/logos/2010/pacman10-i.html", category: "Classic" },
            { id: "slope", title: "Slope", thumbnail: "https://picsum.photos/seed/slope/400/300", iframeUrl: "https://krunker.io/", category: "Action" },
            { id: "paperio", title: "Paper.io 2", thumbnail: "https://picsum.photos/seed/paperio/400/300", iframeUrl: "https://paper-io.com/", category: "IO" },
            { id: "holeio", title: "Hole.io", thumbnail: "https://picsum.photos/seed/holeio/400/300", iframeUrl: "https://hole-io.com/", category: "IO" }
        ];

        // Icon Component Helper
        const Icon = ({ name, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name.toLowerCase().replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase()} className={className}></i>;
        };

        function App() {
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedGame, setSelectedGame] = useState(null);
            const [activeCategory, setActiveCategory] = useState('All');

            const categories = useMemo(() => {
                return ['All', ...new Set(gamesData.map(g => g.category))];
            }, []);

            const filteredGames = useMemo(() => {
                return gamesData.filter(game => {
                    const matchesSearch = game.title.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesCategory = activeCategory === 'All' || game.category === activeCategory;
                    return matchesSearch && matchesCategory;
                });
            }, [searchQuery, activeCategory]);

            return (
                <div className="min-h-screen selection:bg-indigo-500/30">
                    {/* Header */}
                    <header className="sticky top-0 z-40 bg-[#050508]/80 backdrop-blur-xl border-b border-white/5">
                        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between gap-4">
                            <div className="flex items-center gap-2 shrink-0 cursor-pointer" onClick={() => {
                                setActiveCategory('All');
                                setSearchQuery('');
                                setSelectedGame(null);
                            }}>
                                <div className="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                                    <Icon name="gamepad-2" className="text-white w-6 h-6" />
                                </div>
                                <h1 className="text-xl font-bold tracking-tight hidden sm:block">
                                    $$4L <span className="text-indigo-400">GAMES</span>
                                </h1>
                            </div>

                            <div className="relative flex-1 max-w-md">
                                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500">
                                    <Icon name="search" className="w-4 h-4" />
                                </span>
                                <input
                                    type="text"
                                    placeholder="Search games..."
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className="w-full bg-white/5 border border-white/10 rounded-full py-2 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all placeholder:text-zinc-600 text-sm"
                                />
                            </div>

                            <div className="flex items-center gap-4 shrink-0">
                                <button className="p-2 hover:bg-white/5 rounded-full transition-colors text-zinc-400 hover:text-white">
                                    <Icon name="clock" className="w-5 h-5" />
                                </button>
                                <button className="hidden sm:flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-full font-semibold text-sm transition-all shadow-lg shadow-indigo-600/20">
                                    <Icon name="flame" className="w-4 h-4" />
                                    Trending
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-8">
                        {/* Categories */}
                        <div className="flex items-center gap-2 overflow-x-auto pb-4 no-scrollbar mb-8">
                            {categories.map((cat) => (
                                <button
                                    key={cat}
                                    onClick={() => setActiveCategory(cat)}
                                    className={`px-5 py-2 rounded-full text-sm font-medium whitespace-nowrap transition-all ${
                                        activeCategory === cat
                                            ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20'
                                            : 'bg-white/5 text-zinc-400 hover:bg-white/10 hover:text-white'
                                    }`}
                                >
                                    {cat}
                                </button>
                            ))}
                        </div>

                        {/* Hero Section */}
                        {activeCategory === 'All' && searchQuery === '' && (
                            <section className="fade-in mb-12 relative overflow-hidden rounded-3xl bg-gradient-to-br from-indigo-500/20 to-purple-500/20 border border-white/10 p-8 sm:p-12">
                                <div className="relative z-10 max-w-xl">
                                    <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 text-xs font-bold uppercase tracking-wider mb-4">
                                        <Icon name="trophy" className="w-3 h-3" />
                                        Featured Game
                                    </div>
                                    <h2 className="text-4xl sm:text-5xl font-black mb-4 leading-tight">
                                        Experience the <br />
                                        <span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">Next Level</span> of Play
                                    </h2>
                                    <p className="text-zinc-400 text-lg mb-8">
                                        Discover curated unblocked games with zero lag and instant loading.
                                    </p>
                                    <button 
                                        onClick={() => setSelectedGame(gamesData[0])}
                                        className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:scale-105 transition-transform shadow-xl shadow-indigo-600/20"
                                    >
                                        Play Featured
                                    </button>
                                </div>
                                <div className="absolute right-0 top-0 bottom-0 w-1/2 bg-gradient-to-l from-[#050508] to-transparent pointer-events-none hidden lg:block" />
                            </section>
                        )}

                        {/* Games Grid */}
                        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 sm:gap-6">
                            {filteredGames.map((game) => (
                                <div
                                    key={game.id}
                                    className="scale-in group cursor-pointer"
                                    onClick={() => setSelectedGame(game)}
                                >
                                    <div className="relative aspect-[4/3] rounded-2xl overflow-hidden bg-white/5 border border-white/10 mb-3">
                                        <img
                                            src={game.thumbnail}
                                            alt={game.title}
                                            referrerPolicy="no-referrer"
                                            className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
                                        />
                                        <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-4">
                                            <div className="w-full flex items-center justify-between">
                                                <span className="text-xs font-bold uppercase tracking-widest text-indigo-400">Play Now</span>
                                                <Icon name="external-link" className="w-4 h-4" />
                                            </div>
                                        </div>
                                    </div>
                                    <h3 className="font-bold text-zinc-200 group-hover:text-indigo-400 transition-colors truncate">
                                        {game.title}
                                    </h3>
                                    <p className="text-xs text-zinc-500 font-medium">{game.category}</p>
                                </div>
                            ))}
                        </div>

                        {filteredGames.length === 0 && (
                            <div className="py-20 text-center">
                                <div className="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <Icon name="search" className="w-8 h-8 text-zinc-600" />
                                </div>
                                <h3 className="text-xl font-bold mb-2">No games found</h3>
                                <p className="text-zinc-500">Try searching for something else or change the category.</p>
                            </div>
                        )}
                    </main>

                    {/* Game Modal */}
                    {selectedGame && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-0 sm:p-4 md:p-8 bg-black/95 backdrop-blur-sm fade-in">
                            <div className="relative w-full h-full max-w-6xl bg-[#121214] rounded-none sm:rounded-3xl overflow-hidden shadow-2xl border border-white/10 flex flex-col scale-in">
                                {/* Modal Header */}
                                <div className="flex items-center justify-between px-6 py-4 border-b border-white/5 bg-[#121214]">
                                    <div className="flex items-center gap-3">
                                        <div className="w-8 h-8 rounded-lg overflow-hidden">
                                            <img src={selectedGame.thumbnail} alt="" className="w-full h-full object-cover" />
                                        </div>
                                        <h2 className="font-bold text-lg">{selectedGame.title}</h2>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <button className="p-2 hover:bg-white/5 rounded-full transition-colors text-zinc-400 hover:text-white">
                                            <Icon name="maximize-2" className="w-5 h-5" />
                                        </button>
                                        <button
                                            onClick={() => setSelectedGame(null)}
                                            className="p-2 hover:bg-white/5 rounded-full transition-colors text-zinc-400 hover:text-white"
                                        >
                                            <Icon name="x" className="w-6 h-6" />
                                        </button>
                                    </div>
                                </div>

                                {/* Game Iframe Container */}
                                <div className="flex-1 bg-black relative">
                                    <iframe
                                        src={selectedGame.iframeUrl}
                                        className="w-full h-full border-none"
                                        title={selectedGame.title}
                                        allowFullScreen
                                        allow="autoplay; fullscreen; pointer-lock"
                                    />
                                </div>

                                {/* Modal Footer */}
                                <div className="px-6 py-4 bg-[#121214] flex items-center justify-between">
                                    <div className="flex items-center gap-4">
                                        <div className="flex items-center gap-1 text-zinc-500 text-sm">
                                            <Icon name="trophy" className="w-4 h-4 text-yellow-500" />
                                            <span>4.8 Rating</span>
                                        </div>
                                        <div className="flex items-center gap-1 text-zinc-500 text-sm">
                                            <Icon name="gamepad-2" className="w-4 h-4 text-indigo-500" />
                                            <span>{selectedGame.category}</span>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={() => window.open(selectedGame.iframeUrl, '_blank')}
                                        className="flex items-center gap-2 text-sm font-bold text-indigo-500 hover:text-indigo-400 transition-colors"
                                    >
                                        Open in New Tab
                                        <Icon name="external-link" className="w-4 h-4" />
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="border-t border-white/5 py-12 mt-20 bg-black/40 backdrop-blur-md">
                        <div className="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-8">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center">
                                    <Icon name="gamepad-2" className="text-white w-5 h-5" />
                                </div>
                                <span className="font-bold tracking-tight">$$4L GAMES</span>
                            </div>
                            <div className="flex gap-8 text-sm text-zinc-500">
                                <a href="#" className="hover:text-white transition-colors">Privacy Policy</a>
                                <a href="#" className="hover:text-white transition-colors">Terms of Service</a>
                                <a href="#" className="hover:text-white transition-colors">Contact Us</a>
                            </div>
                            <p className="text-sm text-zinc-600">© 2026 $$4L GAMES. All rights reserved.</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
